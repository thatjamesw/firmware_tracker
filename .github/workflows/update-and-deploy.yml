name: Update and Deploy Firmware Tracker

on:
  workflow_dispatch:
  schedule:
    # Try several early slots so the generated site is usually ready before
    # the workday in Europe/Helsinki. Avoid :00 because GitHub scheduled
    # workflows are more likely to be delayed or dropped then.
    - cron: '7 5 * * *'
      timezone: Europe/Helsinki
    - cron: '17 6 * * *'
      timezone: Europe/Helsinki
    - cron: '27 7 * * *'
      timezone: Europe/Helsinki

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  schedule-gate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      run_now: ${{ steps.gate.outputs.run_now }}
    steps:
      - name: Decide whether to run today
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: update-and-deploy.yml
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch. Proceeding."
            exit 0
          fi

          start_utc="$(TZ=Europe/Helsinki date -d 'today 00:00' --utc '+%Y-%m-%dT%H:%M:%SZ')"
          end_utc="$(TZ=Europe/Helsinki date -d 'tomorrow 00:00' --utc '+%Y-%m-%dT%H:%M:%SZ')"

          runs_json="$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/${WORKFLOW_FILE}/runs?branch=${GITHUB_REF_NAME}&event=schedule&per_page=50")"
          current_created_at="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.created_at')"

          prior_active_runs="$(jq \
            --arg current_run_id "${GITHUB_RUN_ID}" \
            --arg current_created_at "$current_created_at" \
            --arg start_utc "$start_utc" \
            --arg end_utc "$end_utc" \
            '[.workflow_runs[]
              | select((.id | tostring) != $current_run_id)
              | select(.created_at >= $start_utc and .created_at < $end_utc)
              | select(.created_at < $current_created_at)
              | select(.status == "queued" or .status == "in_progress")] | length' \
            <<< "$runs_json")"

          successful_runs="$(jq \
            --arg start_utc "$start_utc" \
            --arg end_utc "$end_utc" \
            '[.workflow_runs[]
              | select(.created_at >= $start_utc and .created_at < $end_utc)
              | select(.status == "completed" and .conclusion == "success")] | length' \
            <<< "$runs_json")"

          if [[ "$prior_active_runs" != "0" ]]; then
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "Another scheduled run is already active for today in Europe/Helsinki. Skipping."
          elif [[ "$successful_runs" != "0" ]]; then
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "A scheduled run already succeeded today in Europe/Helsinki. Skipping."
          else
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "No active or successful scheduled run found for today in Europe/Helsinki. Proceeding."
          fi

  build:
    if: needs.schedule-gate.outputs.run_now == 'true'
    needs: schedule-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install sync dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run parser and schema tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Fetch tracked firmware details from official sources
        run: |
          python scripts/fetch_firmware_details.py --fail-on-regression || (
            echo "First fetch attempt failed, retrying after 20s..."
            sleep 20
            python scripts/fetch_firmware_details.py --fail-on-regression
          )

      - name: Generate browser assets
        run: python scripts/generate_index.py

      - name: Show generated changes (no repo push)
        run: |
          if [[ -n "$(git status --porcelain data/devices.json docs/devices docs/FIRMWARE_SUMMARY.md)" ]]; then
            echo "Generated content changed for this run (deploying via Pages artifact)."
            git status --porcelain data/devices.json docs/devices docs/FIRMWARE_SUMMARY.md
          else
            echo "No generated changes detected."
          fi

      - name: Create or Update Sync PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FW_BOT_TOKEN || github.token }}
          commit-message: "chore: sync firmware data from official sources and regenerate assets"
          branch: "automation/daily-firmware-sync"
          delete-branch: false
          title: "chore: daily firmware sync"
          body: |
            Automated daily firmware sync update.

            This PR contains generated updates from official sources:
            - `data/devices.json`
            - `docs/devices/*`
            - `docs/FIRMWARE_SUMMARY.md`
          labels: |
            automation
            firmware-sync
          add-paths: |
            data/devices.json
            docs/devices/categories.js
            docs/devices/index.js
            docs/devices/config.js
            docs/FIRMWARE_SUMMARY.md

      - name: Enable Auto-merge for Sync PR
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.FW_BOT_TOKEN || github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
