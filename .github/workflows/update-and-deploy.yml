name: Update and Deploy Firmware Tracker

on:
  workflow_dispatch:
  schedule:
    # 08:00 Europe/Helsinki across DST changes (EET/EEST):
    # - 05:00 UTC hits 08:00 during EEST (UTC+3)
    # - 06:00 UTC hits 08:00 during EET  (UTC+2)
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  schedule-gate:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      run_now: ${{ steps.gate.outputs.run_now }}
    steps:
      - name: Decide whether to run now (08:00 Europe/Helsinki)
        id: gate
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          local_hour="$(TZ=Europe/Helsinki date +%H)"
          if [[ "$local_hour" == "08" ]]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
            echo "It is 08:00 Europe/Helsinki. Proceeding."
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
            echo "Not 08:00 Europe/Helsinki (current hour: $local_hour). Skipping this run."
          fi

  build:
    if: needs.schedule-gate.outputs.run_now == 'true'
    needs: schedule-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install sync dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run parser and schema tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Fetch tracked firmware details from official sources
        run: |
          python scripts/fetch_firmware_details.py || (
            echo "First fetch attempt failed, retrying after 20s..."
            sleep 20
            python scripts/fetch_firmware_details.py
          )

      - name: Generate browser assets
        run: python scripts/generate_index.py

      - name: Show generated changes (no repo push)
        run: |
          if [[ -n "$(git status --porcelain data/devices.json docs/devices docs/FIRMWARE_SUMMARY.md)" ]]; then
            echo "Generated content changed for this run (deploying via Pages artifact)."
            git status --porcelain data/devices.json docs/devices docs/FIRMWARE_SUMMARY.md
          else
            echo "No generated changes detected."
          fi

      - name: Create or Update Sync PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FW_BOT_TOKEN || github.token }}
          commit-message: "chore: sync firmware data from official sources and regenerate assets"
          branch: "automation/daily-firmware-sync"
          delete-branch: false
          title: "chore: daily firmware sync"
          body: |
            Automated daily firmware sync update.

            This PR contains generated updates from official sources:
            - `data/devices.json`
            - `docs/devices/*`
            - `docs/FIRMWARE_SUMMARY.md`
          labels: |
            automation
            firmware-sync
          add-paths: |
            data/devices.json
            docs/devices/categories.js
            docs/devices/index.js
            docs/devices/config.js
            docs/FIRMWARE_SUMMARY.md

      - name: Enable Auto-merge for Sync PR
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.FW_BOT_TOKEN || github.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
