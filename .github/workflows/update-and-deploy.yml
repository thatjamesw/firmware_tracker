name: Update and Deploy Firmware Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 * * *'
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install sync dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run parser and schema tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Fetch tracked firmware details from official sources
        run: |
          python scripts/fetch_firmware_details.py || (
            echo "First fetch attempt failed, retrying after 20s..."
            sleep 20
            python scripts/fetch_firmware_details.py
          )

      - name: Generate browser assets
        run: python scripts/generate_index.py

      - name: Commit generated files (scheduled/manual runs)
        if: github.event_name != 'push'
        run: |
          if [[ -n "$(git status --porcelain data/devices.json docs/devices docs/FIRMWARE_SUMMARY.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/devices.json docs/devices/categories.js docs/devices/index.js docs/devices/config.js docs/FIRMWARE_SUMMARY.md
            git commit -m "chore: sync firmware data from official sources and regenerate assets"
            git push
          else
            echo "No generated changes to commit"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
